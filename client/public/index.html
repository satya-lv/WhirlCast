<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1B3A6B" />
    <meta name="description" content="DemandIQ — Whirlpool India Intelligent Demand Planning" />
    <title>DemandIQ — Whirlpool India Demand Planning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: 'Inter', sans-serif; background: #F4F6FA; }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse-red {
        0% { box-shadow: 0 0 0 0 rgba(220,38,38,0.5); }
        70% { box-shadow: 0 0 0 10px rgba(220,38,38,0); }
        100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); }
      }
      @keyframes pulse-amber {
        0% { box-shadow: 0 0 0 0 rgba(217,119,6,0.5); }
        70% { box-shadow: 0 0 0 10px rgba(217,119,6,0); }
        100% { box-shadow: 0 0 0 0 rgba(217,119,6,0); }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(24px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      .fade-in-up { animation: fadeInUp 0.3s ease forwards; }
      .slide-in-right { animation: slideInRight 0.35s ease forwards; }
      .scale-in { animation: scaleIn 0.2s ease forwards; }
      .pulse-red { animation: pulse-red 1.5s infinite; }
      .pulse-amber { animation: pulse-amber 1.5s infinite; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
